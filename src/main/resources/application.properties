spring.datasource.url=jdbc:mysql://localhost:3306/khoj_db
spring.datasource.username=khoj_user
spring.datasource.password=khoj_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jpa.model-generator.exclude-record-classes=true